<h1 class="content-listing-header sans">Articles</h1>
<ul class="content-listing">
  {% for post in posts %}
  <li class="listing">
    <hr class="slender">
    <a href="{{ site.baseurl }}{{ post.url }}">
      <h3 class="contrast">{{ post.title }}</h3>
    </a>
    <br><span class="smaller">{{ post.date | dateformat }}</span><br />
    <div>{{ post.excerpt_html | safe }}</div>
  </li>
  {% endfor %}
</ul>
